<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>ZIP Upload</title>

<style>

body{

background:#87CEEB; /* голубой фон */

font-family:Arial;

margin:0;

text-align:center;

}

.header-image{

width:100%;

max-height:600px;

object-fit:cover;

display:block;

}

.container{

padding:20px;

}

table{

margin:auto;

border-collapse:collapse;

width:600px;

background:white;

}

td,th{

border:1px solid black;

padding:10px;

}

</style>

</head>

<body>

<!-- Картинка сверху -->
<img
class="header-image"
src="top-image.jpg"
alt="header image"
>

<div class="container">

<form
action="/upload"
method="POST"
enctype="multipart/form-data"
>

<p>ZIP:</p>

<input
type="file"
name="zipfile"
accept=".zip"
required
>

<p>Обложка:</p>

<input
type="file"
name="cover"
accept="image/*"
>

<br><br>

<button>

Загрузить

</button>

</form>

<hr>

<table border="1">

<thead>

<tr>

<th>Обложка</th>

<th>Файл</th>

<th>Скачать</th>

</tr>

</thead>

<tbody id="files">

</tbody>

</table>

<script>

async function loadFiles(){

const res=await fetch("/files");

const files=await res.json();

const tbody=
document.getElementById("files");

tbody.innerHTML="";

files.forEach(item=>{

tbody.innerHTML+=`

<tr>

<td>

${
item.cover ?

`<img
src="/covers/${item.cover}"
width="120">`

:

"Нет"

}

</td>

<td>

${item.original}

</td>

<td>

<a href="/download/${item.file}">

Скачать

</a>

</td>

</tr>

`;

});

}

loadFiles();

</script>
